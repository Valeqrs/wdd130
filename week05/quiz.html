<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz Format</title>
    <link rel="stylesheet" href="quiz.css">
</head>

<body>
    <main>
        <h1>✅ Basic HTML and CSS quiz</h1>
        <form action="">
            <div class="quiz-item">
                <label for="q1">1.The HTML element used to define an inline style is the ______
                    attribute.</label>
                <input type="text" id="q1" name="q2">
            </div>
            <div class="quiz-item">
                <label for="q2">2.Describe what the CSS property display: flex; does and name two
                    common flex container properties.</label>
                <input type="name" id="q2" name="q2">
            </div>
            <div class="quiz-item">
                <label for="q3">3.Which CSS unit is relative to the font-size of the root element (
                    <html>)?
                </label>
                <select id="q3" name=q3>
                    <option value="" selected disabled></option>
                    <option value="a">A. &lt;!--comment--&gt;</option>
                    <option value="b">B. /*comment*/</option>
                    <option value="c">C. //comment</option>
                </select>
            </div>
            <div class="quiz-item">
                <label for="q4">4.How many different CSS position values are there (e.g., static,
                    relative, etc.)? Enter the number.</label>
                <code>margin: 10px 5px 15px;</code>
                <input type="number" id="q4" name="q4">
            </div>
            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>

</html>
